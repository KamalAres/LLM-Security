name: 📺 YouTube Video Summarizer

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube URL to summarize"
        required: true
        type: string
      tags:
        description: "Optional tags (comma-separated)"
        required: false
        type: string

  issues:
    types: [labeled]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      # ── Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Resolve URL ────────────────────────────────────────────
      - name: Resolve YouTube URL
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.youtube_url }}" >> $GITHUB_OUTPUT
            echo "tags=${{ github.event.inputs.tags }}" >> $GITHUB_OUTPUT
            echo "issue_number=" >> $GITHUB_OUTPUT
          else
            ISSUE_BODY="${{ github.event.issue.body }}"
            URL=$(echo "$ISSUE_BODY" | grep -oP 'https?://[^\s]+youtube[^\s]+|https?://youtu\.be/[^\s]+' | head -1)
            TAGS=$(echo "$ISSUE_BODY" | grep -i '^tags:' | sed 's/^[Tt]ags://;s/ //g')
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "tags=$TAGS" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      # ── Label check ────────────────────────────────────────────
      - name: Check label (issue trigger only)
        if: github.event_name == 'issues' && github.event.label.name != 'summarize'
        run: |
          echo "Label is not 'summarize'. Skipping."
          exit 0

      # ── Python setup ───────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ CRITICAL: Node.js for yt-dlp JS runtime
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir youtube-transcript-api requests yt-dlp

      # 🔍 Debug info (helps troubleshooting)
      - name: Debug environment
        run: |
          python --version
          node --version
          pip show youtube-transcript-api
          yt-dlp --version

      # ── Run summarizer ─────────────────────────────────────────
      - name: Generate summary
        id: summarize
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_URL: ${{ steps.resolve.outputs.url }}
          TAGS: ${{ steps.resolve.outputs.tags }}
        run: |
          python scripts/summarize.py
          echo "output_file=$(cat /tmp/output_file.txt)" >> $GITHUB_OUTPUT

      # ── Commit note ────────────────────────────────────────────
      - name: Commit summary to notes/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/
          git diff --cached --quiet || git commit -m "📝 Add summary: $(cat /tmp/video_title.txt)"
          git push

      # ── Comment on issue ───────────────────────────────────────
      - name: Comment on issue
        if: steps.resolve.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const filePath = process.env.OUTPUT_FILE;
            const content = fs.readFileSync(filePath, 'utf8').slice(0, 65000);
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.resolve.outputs.issue_number }},
              body: `✅ Summary saved to \`${filePath}\`\n\n---\n\n${content}`
            });
        env:
          OUTPUT_FILE: ${{ steps.summarize.outputs.output_file }}
