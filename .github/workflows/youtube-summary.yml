name: 📺 YouTube Video Summarizer

on:
  # Trigger manually from GitHub UI with a YouTube URL
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube URL to summarize"
        required: true
        type: string
      tags:
        description: "Optional tags (comma-separated, e.g. 'ai,research,tutorial')"
        required: false
        type: string

  # Trigger via GitHub Issue with label 'summarize'
  issues:
    types: [labeled]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Resolve URL depending on trigger ──────────────────────────────────
      - name: Resolve YouTube URL
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=${{ github.event.inputs.youtube_url }}" >> $GITHUB_OUTPUT
            echo "tags=${{ github.event.inputs.tags }}" >> $GITHUB_OUTPUT
            echo "issue_number=" >> $GITHUB_OUTPUT
          else
            # Parse URL from issue body (first line that starts with http)
            ISSUE_BODY="${{ github.event.issue.body }}"
            URL=$(echo "$ISSUE_BODY" | grep -oP 'https?://[^\s]+youtube[^\s]+|https?://youtu\.be/[^\s]+' | head -1)
            TAGS=$(echo "$ISSUE_BODY" | grep -i '^tags:' | sed 's/^[Tt]ags://;s/ //g')
            echo "url=$URL" >> $GITHUB_OUTPUT
            echo "tags=$TAGS" >> $GITHUB_OUTPUT
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      # ── Only run on 'summarize' label for issue trigger ───────────────────
      - name: Check label (issue trigger only)
        if: github.event_name == 'issues' && github.event.label.name != 'summarize'
        run: |
          echo "Label is not 'summarize'. Skipping."
          exit 0

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install youtube-transcript-api anthropic pytube requests

      # ── Run summarizer ────────────────────────────────────────────────────
      - name: Generate summary
        id: summarize
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_URL: ${{ steps.resolve.outputs.url }}
          TAGS: ${{ steps.resolve.outputs.tags }}
        run: |
          python scripts/summarize.py
          echo "output_file=$(cat /tmp/output_file.txt)" >> $GITHUB_OUTPUT

      # ── Commit note to repo ───────────────────────────────────────────────
      - name: Commit summary to notes/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/
          git diff --cached --quiet || git commit -m "📝 Add summary: $(cat /tmp/video_title.txt)"
          git push

      # ── Comment on issue (if triggered from issue) ────────────────────────
      - name: Comment on issue
        if: steps.resolve.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const filePath = process.env.OUTPUT_FILE;
            const content = fs.readFileSync(filePath, 'utf8').slice(0, 65000);
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.resolve.outputs.issue_number }},
              body: `✅ Summary saved to \`${filePath}\`\n\n---\n\n${content}`
            });
        env:
          OUTPUT_FILE: ${{ steps.summarize.outputs.output_file }}
